monitor=DP-2,1920x1080@120,0x0,1
#monitor= HDMI-A-1,disable
#monitor=HDMI-A-1,1920x1080@60,1920x0,2
# Set programs that you use
$terminal = kitty
$fileManager = nautilus 
$menu = rofi -show drun 
$browser = firefox

exec-once = waybar
exec-once = hyprpaper
exec-once = pasystray
exec-once = blueman-applet
exec-once = /usr/libexec/polkit-mate-authentication-agent-1
exec-once = gvfs-mount-daemon
exec-once = hypridle
#exec-once=/usr/libexec/hyprpolkitagent
#env = XCURSOR_THEME=BreezeX-RosePine-Linux
#env = XCURSOR_SIZE,32
#env = HYPRCURSOR_THEME,rose-pine-hyprcursor
#env = HYPRCURSOR_SIZE,32
env = QT_CURSOR_THEME,catppuccin-mocha-light-cursors
env = QT_CURSOR_SIZE,32
env = MOZ_ENABLE_WAYLAND,1
env = WLR_NO_HARDWARE_CRSORS,1
env = QT_QPA_PLATFORMTHEME,qt5ct

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 0

    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    #col.active_border = rgba(f5c2e4bb) 
    #col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}



# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.90

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true;
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 2, default
    animation = borderangle, 1, 2, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, default
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    disable_hyprland_qtutils_check = true 
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    mouse_move_enables_dpms=true
    key_press_enables_dpms=true
}


input {
    kb_layout = us,it
    kb_options=grp:win_space_toggle
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
    }
}

cursor {
    no_warps = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER # Sets "Windows" key as main modifier
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, x, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, 2
bind = $mainMod SHIFT, W, exec, $browser
bind = $mainMod SHIFT, C, exec, $fileManager
bind = $mainMod SHIFT, T, exec, telegram-desktop
bind = $mainMod SHIFT, V, exec, [float] pavucontrol
bind = $mainMod SHIFT, B, exec, [float] blueman-manager
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, Q, exec, 'hyprctl dispatch exit'
bind = ,Print, exec, grim - | tee "$HOME/Pictures/Screenshots"/"Screenshot_$(date +%Y%m%d-%H%M%S).png" | wl-copy
bind = CTRL,Print, exec, grim -g "$(slurp)" - | tee "$HOME/Pictures/Screenshots"/"Screenshot_$(date +%Y%m%d-%H%M%S).png" | wl-copy
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

binde = $mainMod SHIFT, right, resizeactive, 50 0
binde = $mainMod SHIFT, left, resizeactive, -50 0
binde = $mainMod SHIFT, up, resizeactive, 0 -50
binde = $mainMod SHIFT, down, resizeactive, 0 50


workspace = 1,monitor:DP-2,rounding:true,decorate:true,
workspace = 2,monitor:DP-2,rounding:true,decorate:true,
workspace = 3,monitor:DP-2,rounding:true,decorate:true,
workspace = 4,monitor:DP-2,rounding:true,decorate:true,
workspace = 5,monitor:DP-2,rounding:true,decorate:true,
workspace = 6,monitor:DP-2,rounding:true,decorate:true,
workspace = 7,monitor:DP-2,rounding:true,decorate:true,
workspace = 8,monitor:DP-2,rounding:true,decorate:true,
workspace = 9,monitor:DP-2,rounding:true,decorate:true,
workspace = 0,monitor:DP-2,rounding:true,decorate:true,



